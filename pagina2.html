<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubriendo Nicaragua — Bitácora de campo</title>
<style>
  :root{
    --papel:#EFE6D3;
    --papel-2:#E5D8BC;
    --tinta:#2B2420;
    --lava:#C44A1F;
    --lago:#1F6F6B;
    --sello:#8C2F1E;
    --linea: rgba(43,36,32,0.22);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--papel);
    color:var(--tinta);
    font-family:'Courier New', monospace;
    min-height:100vh;
    overflow-x:hidden;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(43,36,32,0.04) 0, transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(43,36,32,0.04) 0, transparent 45%);
  }

  /* textura de papel sutil */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.5;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(43,36,32,0.012) 3px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(43,36,32,0.012) 3px);
    z-index:1;
  }

  /* ---------- HEADER ---------- */
  header{
    padding:60px 20px 30px;
    text-align:center;
    position:relative;
    max-width:760px;
    margin:0 auto;
  }

  .eyebrow{
    font-size:0.72rem;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--sello);
    margin-bottom:16px;
    display:inline-block;
    border:1px solid var(--sello);
    border-radius:2px;
    padding:4px 10px;
    transform:rotate(-1.2deg);
  }

  header h1{
    font-family:Georgia,'Times New Roman',serif;
    font-weight:900;
    font-size:clamp(2.4rem,6.5vw,4.4rem);
    letter-spacing:0.5px;
    color:var(--tinta);
    line-height:1.0;
    margin-bottom:18px;
    text-transform:uppercase;
  }

  header h1 span{
    color:var(--lava);
    font-style:italic;
    text-transform:none;
  }

  header p{
    max-width:580px;
    margin:0 auto;
    font-size:0.92rem;
    line-height:1.75;
    color:rgba(43,36,32,0.72);
  }

  .firma{
    margin-top:22px;
    font-family:Georgia,serif;
    font-style:italic;
    font-size:0.82rem;
    color:rgba(43,36,32,0.5);
  }

  /* ---------- LAYOUT PRINCIPAL: termómetro + diario ---------- */
  .bitacora{
    max-width:1080px;
    margin:50px auto 90px;
    padding:0 20px;
    display:grid;
    grid-template-columns:90px 1fr;
    gap:28px;
    align-items:start;
  }

  /* ---------- TERMÓMETRO VOLCÁNICO ---------- */
  .termometro{
    position:sticky;
    top:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
  }

  .termometro .titulo-term{
    font-size:0.6rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(43,36,32,0.5);
    margin-bottom:14px;
    text-align:center;
    writing-mode:horizontal-tb;
  }

  .tubo{
    position:relative;
    width:14px;
    height:340px;
    background:rgba(43,36,32,0.08);
    border:1.5px solid var(--tinta);
    border-radius:10px;
    overflow:hidden;
  }

  .tubo .mercurio{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:linear-gradient(180deg, var(--lava), var(--sello));
    border-radius:0 0 10px 10px;
    transition:height .6s ease;
  }

  .marcas{
    position:absolute;
    left:22px;
    top:0;
    height:340px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

    border:none;
